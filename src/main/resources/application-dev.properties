server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT — must match the secret in the auth service
jwt.secret=c2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS1kb25vdC11c2UtaW4tcHJvZHVjdGlvbg==

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[2].id=message-service
spring.cloud.gateway.routes[2].uri=lb://message
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/messages/**

spring.cloud.gateway.routes[3].id=chat-service
spring.cloud.gateway.routes[3].uri=lb://chat
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/chats/**

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://notification
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**
